name: Compile All Typst Questions
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Typst
        run: |
          curl -L https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz \
          | tar -xJ --strip-components=1 -C /usr/local/bin typst-x86_64-unknown-linux-musl/typst

      - name: Compile PDF files
        run: |
          mkdir -p dist/SYP dist/PRT dist/CJL
          shopt -s nullglob

          for subject in SYP PRT; do
            if [ -d "$subject" ]; then
              for file in "$subject"/*.typ; do
                filename=$(basename "$file" .typ)
                echo "Compiling: $file -> dist/$subject/$filename.pdf"
                typst compile --root . "$file" "dist/$subject/$filename.pdf"
              done
            fi
          done

          for author_dir in CJL/*/; do
            author=$(basename "$author_dir")
            for file in "$author_dir"*.typ; do
              book=$(basename "$file" .typ)
              output="dist/CJL/${author}-${book}.pdf"
              echo "Compiling: $file -> $output"
              typst compile --root . "$file" "$output"
            done
          done

      - name: Deploy to generated branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: generated
          commit_message: "Auto build: ${{ github.sha }}"
