name: Compile All Typst Questions
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Typst
        run: |
          curl -L https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz \
          | tar -xJ --strip-components=1 -C /usr/local/bin typst-x86_64-unknown-linux-musl/typst

      - name: Compile PDF files
        run: |
          mkdir -p dist/OSY dist/SYP dist/WEB
          shopt -s nullglob

          for subject in OSY SYP WEB; do
            if [ -d "$subject" ]; then
              for file in "$subject"/*.typ; do
                filename=$(basename "$file" .typ)
                echo "Kompiluju: $file -> dist/$subject/$filename.pdf"
                typst compile "$file" "dist/$subject/$filename.pdf"
              done
            fi
          done

      - name: Deploy to generated branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: generated
          commit_message: "Auto build: ${{ github.sha }}"
